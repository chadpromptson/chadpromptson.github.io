<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Localhost Ventures 3000 organizational chart version 0.2</title>
  <desc id="desc">A satirical full Season 1 organizational chart. Mom and Dad Ventures funds Localhost Ventures 3000. Chad is founder, Prompt 42 is the later AI cofounder, Uncle Martin is the later external technical advisor, and the infrastructure consists of Dad's iPad, 50 dollars of AI tokens, family Wi-Fi, a PlayStation, and Dad.</desc>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#191922" stroke-width="1"/>
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5f7cff" stop-opacity="0.2"/>
      <stop offset="0.52" stop-color="#08080a" stop-opacity="0"/>
      <stop offset="1" stop-color="#ff4fd8" stop-opacity="0.16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="8" stdDeviation="0" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c7ff45"/>
    </marker>
    <style>
      .condensed { font-family: "DejaVu Sans", Arial, sans-serif; font-stretch: condensed; font-weight: 900; }
      .sans { font-family: "DejaVu Sans", Arial, sans-serif; }
      .mono { font-family: "DejaVu Sans Mono", monospace; }
      .connector { fill: none; stroke: #5b5b68; stroke-width: 3; }
      .advisor { fill: none; stroke: #ff4fd8; stroke-width: 3; stroke-dasharray: 10 9; }
      .node-dot { fill: #c7ff45; }
      .card-label { fill: #8f8f9c; font-size: 16px; font-weight: 800; letter-spacing: 1.6px; }
      .card-title { fill: #f5f2e9; font-size: 26px; font-weight: 900; }
      .card-note { fill: #b9b5aa; font-size: 14px; }
      .later { fill: #08080a; font-size: 11px; font-weight: 900; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#08080a"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.8"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <path d="M-80 490 C230 170 470 705 820 390 C1120 120 1340 180 1680 390" fill="none" stroke="#30235a" stroke-width="4" opacity="0.65"/>
  <path d="M-20 555 C320 245 575 720 930 450 C1215 230 1390 230 1655 355" fill="none" stroke="#ff4fd8" stroke-width="2" opacity="0.18"/>

  <g transform="translate(62 43)">
    <rect x="0" y="0" width="14" height="14" fill="#c7ff45" transform="rotate(45 7 7)"/>
    <text x="30" y="14" class="mono" fill="#c7ff45" font-size="16" font-weight="800" letter-spacing="2">THE SUNDAY PROMPT / CORPORATE DESK</text>
  </g>
  <text x="62" y="124" class="condensed" fill="#f5f2e9" font-size="64" letter-spacing="-2">THE $50 ENTERPRISE</text>
  <text x="1538" y="66" class="mono" fill="#8f8f9c" font-size="14" text-anchor="end">FULL SEASON 1 CAST / RETROSPECTIVE</text>
  <g transform="translate(1308 88) rotate(2)">
    <rect width="230" height="46" fill="none" stroke="#ff4fd8" stroke-width="3"/>
    <text x="115" y="30" class="condensed" fill="#ff4fd8" font-size="21" text-anchor="middle" letter-spacing="2">SATIRE / v0.2</text>
  </g>

  <!-- Investor -->
  <g filter="url(#shadow)">
    <rect x="70" y="170" width="410" height="118" fill="#c7ff45"/>
    <rect x="82" y="182" width="386" height="94" fill="none" stroke="#08080a" stroke-width="2" opacity="0.5"/>
    <text x="275" y="208" class="mono" fill="#08080a" font-size="14" text-anchor="middle" font-weight="900" letter-spacing="2">ORIGINAL PRE-SEED INVESTOR</text>
    <text x="275" y="244" class="condensed" fill="#08080a" font-size="31" text-anchor="middle">MOM &amp; DAD VENTURES</text>
    <text x="275" y="268" class="sans" fill="#08080a" font-size="13" text-anchor="middle" font-weight="800">LEAD INVESTOR: MOM / CHECK: $50 / PORTFOLIO: CHAD</text>
  </g>

  <!-- Holding company -->
  <g filter="url(#shadow)">
    <rect x="590" y="170" width="480" height="118" fill="#f5f2e9"/>
    <rect x="590" y="170" width="13" height="118" fill="#ff4fd8"/>
    <text x="625" y="207" class="mono" fill="#5f5f69" font-size="14" font-weight="900" letter-spacing="2">PARENT COMPANY / INCORPORATED IN MARKDOWN</text>
    <text x="625" y="246" class="condensed" fill="#08080a" font-size="32">LOCALHOST VENTURES 3000</text>
    <text x="625" y="270" class="sans" fill="#4b4b54" font-size="13" font-weight="700">ADDRESS: localhost:3000 / STATUS: OPERATIONAL ON PAPER</text>
  </g>

  <!-- Martin -->
  <g filter="url(#shadow)">
    <rect x="1160" y="170" width="370" height="118" fill="#111115" stroke="#ff4fd8" stroke-width="2" stroke-dasharray="9 7"/>
    <rect x="1373" y="182" width="142" height="25" fill="#ff4fd8"/>
    <text x="1444" y="199" class="mono later" text-anchor="middle">INTRODUCED LATER</text>
    <text x="1185" y="210" class="mono card-label">EXTERNAL ADVISORY</text>
    <text x="1185" y="246" class="condensed card-title">UNCLE MARTIN</text>
    <text x="1185" y="270" class="sans card-note">Technical Advisor / Board Observer / Family Friend</text>
  </g>

  <path d="M480 229 H575" stroke="#c7ff45" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="527" y="215" class="mono" fill="#c7ff45" font-size="11" text-anchor="middle">FUNDS</text>
  <path class="advisor" d="M1160 229 H1085"/>
  <text x="1120" y="215" class="mono" fill="#ff4fd8" font-size="10" text-anchor="middle">ADVICE</text>

  <!-- Founder and AI cofounder -->
  <path class="connector" d="M830 288 V330 M505 330 H1155 M505 330 V356 M1155 330 V356"/>
  <circle class="node-dot" cx="830" cy="330" r="7"/>

  <g filter="url(#shadow)">
    <rect x="225" y="356" width="560" height="138" fill="#f5f2e9"/>
    <rect x="225" y="356" width="13" height="138" fill="#5f7cff"/>
    <text x="263" y="393" class="mono" fill="#5f5f69" font-size="15" font-weight="900" letter-spacing="1.7">FOUNDER &amp; PROMPT EXECUTIVE OFFICER</text>
    <text x="263" y="440" class="condensed" fill="#08080a" font-size="46">CHAD PROMPTSON</text>
    <text x="263" y="470" class="sans" fill="#4b4b54" font-size="14" font-weight="700">CEO / INITIAL ENGINEERING DEPARTMENT / REPORTS TO MOM AT DINNER</text>
    <g transform="translate(630 368) rotate(-2)">
      <rect width="132" height="32" fill="#5f7cff"/>
      <text x="66" y="22" class="mono" fill="#ffffff" font-size="12" text-anchor="middle" font-weight="900">SELF-VERIFIED</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="875" y="356" width="560" height="138" fill="#111115" stroke="#343440" stroke-width="2"/>
    <rect x="875" y="356" width="13" height="138" fill="#ff4fd8"/>
    <rect x="1274" y="368" width="145" height="25" fill="#ff4fd8"/>
    <text x="1346" y="385" class="mono later" text-anchor="middle">INTRODUCED LATER</text>
    <text x="913" y="405" class="mono card-label">AI COFOUNDER &amp; ENGINEERING DEPARTMENT</text>
    <text x="913" y="449" class="condensed card-title" font-size="40">PROMPT #42</text>
    <text x="913" y="476" class="sans card-note">META-PROMPT FOR EVERYTHING / CURRENT VERSION: v0.1</text>
  </g>

  <!-- Infrastructure bus -->
  <path class="connector" d="M830 494 V550 M195 550 H1405"/>
  <circle class="node-dot" cx="830" cy="522" r="7"/>
  <path class="connector" d="M195 550 V598 M495 550 V598 M800 550 V598 M1105 550 V598 M1405 550 V598"/>

  <g filter="url(#shadow)">
    <rect x="55" y="598" width="280" height="168" fill="#111115" stroke="#343440" stroke-width="2"/>
    <rect x="55" y="598" width="280" height="8" fill="#5f7cff"/>
    <text x="80" y="640" class="mono card-label">DEV MACHINE</text>
    <text x="80" y="682" class="condensed card-title">DAD'S IPAD</text>
    <text x="80" y="716" class="sans card-note">Asset status: on loan</text>
    <text x="80" y="741" class="sans card-note">Owner retains admin rights</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="355" y="598" width="280" height="168" fill="#111115" stroke="#343440" stroke-width="2"/>
    <rect x="355" y="598" width="280" height="8" fill="#c7ff45"/>
    <text x="380" y="640" class="mono card-label">COMPUTE</text>
    <text x="380" y="682" class="condensed card-title">$50 AI TOKENS</text>
    <text x="380" y="716" class="sans card-note">100% of capital deployed</text>
    <text x="380" y="741" class="sans card-note">Runway: one month</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="598" width="280" height="168" fill="#111115" stroke="#343440" stroke-width="2"/>
    <rect x="660" y="598" width="280" height="8" fill="#ff4fd8"/>
    <text x="685" y="640" class="mono card-label">CLOUD</text>
    <text x="685" y="682" class="condensed card-title">FAMILY WI-FI</text>
    <text x="685" y="716" class="sans card-note">Shared tenancy</text>
    <text x="685" y="741" class="sans card-note">Router managed externally</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="965" y="598" width="280" height="168" fill="#111115" stroke="#343440" stroke-width="2"/>
    <rect x="965" y="598" width="280" height="8" fill="#f5f2e9"/>
    <text x="990" y="640" class="mono card-label">QUALITY ASSURANCE</text>
    <text x="990" y="682" class="condensed card-title">PLAYSTATION 4</text>
    <text x="990" y="716" class="sans card-note">Controller-first testing</text>
    <text x="990" y="741" class="sans card-note">Later: AgentStation 4</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1265" y="598" width="280" height="168" fill="#111115" stroke="#343440" stroke-width="2"/>
    <rect x="1265" y="598" width="280" height="8" fill="#ff4fd8"/>
    <text x="1290" y="640" class="mono card-label">HEAD OF INFRA</text>
    <text x="1290" y="682" class="condensed card-title">DAD*</text>
    <text x="1290" y="716" class="sans card-note">*Title disputed by Dad</text>
    <text x="1290" y="741" class="sans card-note">Physical reality department</text>
  </g>

  <g transform="translate(62 802)">
    <rect width="1476" height="2" fill="#2d2d38"/>
    <text x="0" y="30" class="mono" fill="#b9b5aa" font-size="13" font-weight="800" letter-spacing="1.5">EDITORIAL LEGEND: COMPLETE SEASON 1 CAST SHOWN / CHARACTERS ENTER THE STORY IN EPISODE ORDER</text>
    <text x="1476" y="30" class="mono" fill="#c7ff45" font-size="13" text-anchor="end" font-weight="900">ADVISORY LINES DO NOT CONFER AUTHORITY</text>
    <text x="0" y="66" class="mono" fill="#8f8f9c" font-size="12">ARCHIVAL SOURCE: PRE-INCORPORATION ORG CHART v0.1</text>
    <text x="1476" y="66" class="mono" fill="#c7ff45" font-size="14" text-anchor="end" font-weight="900">TECHNICAL INFRASTRUCTURE: OPERATIONAL</text>
  </g>
</svg>
